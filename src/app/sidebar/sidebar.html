<div class="sidebar-header">
    <div class="logo-container">
        <div class="logo-icon">HR</div>
        <div class="logo-text">HRMApp</div>
    </div>
</div>

<div class="sidebar-menu">
    @for (menu of menuItems; track menu.id) {
        <div class="sidebar-item" 
             [class.active]="activeMenu === menu.menuName"
             (click)="onMenuItemClick(menu.menuName)">
            <span class="sidebar-icon">{{ menu.icon }}</span>
            <span class="sidebar-label">{{ menu.menuName }}</span>
            <!-- Active indicator dot -->
            <span class="active-dot" *ngIf="activeMenu === menu.menuName"></span>
        </div>
    }
</div>

<style>
    :host {
        display: flex;
        flex-direction: column;
        background-color: #ffffff;
        height: 100%;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        box-sizing: border-box;
    }

    .sidebar-header {
        padding: 28px 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 1px solid #f1f5f9;
    }

    .logo-container {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .logo-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #4f46e5, #8b5cf6);
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-weight: 800;
        font-size: 18px;
        box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
    }

    .logo-text {
        font-size: 20px;
        font-weight: 800;
        color: #1e293b;
        letter-spacing: -0.5px;
    }

    .sidebar-menu {
        padding: 16px 12px;
        flex: 1;
        overflow-y: auto;
    }

    .sidebar-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        margin-bottom: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        color: #64748b;
        transition: all 0.25s ease;
        border-radius: 12px;
        border-left: 4px solid transparent;
        position: relative;
    }

    .sidebar-item:hover {
        background: #f1f5f9;
        color: #1e293b;
        transform: translateX(2px);
    }

    /* ACTIVE STATE - Very visible */
    .sidebar-item.active {
        background: linear-gradient(90deg, #eef2ff 0%, #e0e7ff 100%);
        color: #4f46e5;
        font-weight: 700;
        border-left-color: #4f46e5;
        box-shadow: 0 2px 8px rgba(79, 70, 229, 0.15);
    }

    .sidebar-item.active .sidebar-icon {
        transform: scale(1.15);
    }

    .sidebar-icon {
        font-size: 20px;
        width: 28px;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease;
    }

    .sidebar-label {
        flex: 1;
    }

    /* Active dot indicator */
    .active-dot {
        width: 8px;
        height: 8px;
        background: #4f46e5;
        border-radius: 50%;
        box-shadow: 0 0 6px rgba(79, 70, 229, 0.5);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.2); }
    }

    .sidebar-menu::-webkit-scrollbar {
        width: 4px;
    }
    .sidebar-menu::-webkit-scrollbar-track {
        background: transparent;

        border-radius: 4px;

</style>
